{% extends "admin/change_form.html" %}
{% load i18n static %}

{% block content %}
    {% if page_types %}
        <h2>{% translate "Choose page type" %}</h2>
        <ul>
            {% for id, name in page_types %}
                <li>
                    <a href="?page_type={{ id }}" class="addlink" role="button">
                        {% translate "Add" %} {{ name }}
                    </a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        {{ block.super }}
    {% endif %}
{% endblock %}

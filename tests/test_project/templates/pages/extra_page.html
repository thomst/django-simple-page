{% extends 'pages/base_page.html' %}

{% block content %}
    <h1>{{ page.title }}</h1>
    <p>{{ special_info }}</p>
    {% for region in regions %}
        <div id="{{ region.slug }}">
            <h2>{{ region.title }}</h2>
            {% for section in region.sections %}
                {{ section.html }}
            {% endfor %}
        </div>
    {% endfor %}
{% endblock %}
